[Inertia]
; Configures the pointer inertia parameters. Units are shown in parentheses.
;
; Inertia is applied when, during the final ScanTime (10 ms) before the user
; lifts their hand from the touchpad, the pointer is moving at a speed equal
; to or greater than Velocity (pixels per 10 ms). The pointer speed immediately
; before the hand is lifted, here referred to as the "pre-lift speed", is
; displayed in a tooltip for the duration of ShowVelocity (10 ms).
;
; While inertia is active, the pointer speed will not exceed MaxVelocity
; (pixels per 10 ms). The initial inertia speed is proportional to the pre-lift
; speed raised to the power of InitialVelocityExp. When this initial speed
; reaches MaxVelocity, it corresponds to InitialVelocity times the pre-lift
; speed.
; Speed is adjusted by multiplying the horizontal component by the square root
; of AspectRatio, and the vertical component by the reciprocal of the square
; root of AspectRatio.
;
; The pointer speed decays by Resistance% every 10 ms.
; If Reflection is set to a negative value, the pointer will bounce when it
; reaches the edge of the screen. Upon bouncing, the speed component
; perpendicular to the edge is multiplied by Reflection, and the component
; parallel to the edge is multiplied by ReflectionTangent.
;
; To disable inertia entirely, set InitialVelocity=0.

ScanTime = 9
Velocity = 1.0
MaxVelocity = 40
InitialVelocity = 0.6
InitialVelocityExp = 1.05
AspectRatio = 1.1
Resistance = 1.3
Reflection = -0.5
ReflectionTangent = 0.8
ShowVelocity = 0


[ThumbKey]
; After the user lifts their hand from the touchpad, the shortcut key
; assignments remain enabled for the duration of UnhookDelay (10 ms).

UnhookDelay = 40


; Configures smooth scrolling behavior.
;
; For applications that support fractional mouse-wheel notches, specifying
; their process names in ScrollSmooth enables smooth scrolling.
; To specify multiple processes, separate them with "|".
; To smooth only a specific part of a window, specify a control class name.
; Enclose the control class name with "<" and ">", and append it after the
; process name.
; If only a control class name is specified, all processes will be targeted.
;
; You can also specify the number of subdivisions per wheel notch after the
; process name or control class name.
; Separate the process name and the subdivision value with ":".
; For sysListView32, used in Explorer and similar applications, smooth
; scrolling is implemented using a dedicated API instead of wheel events
; (except for icon view and details view).
; Configure it the same way as controls that scroll 24 pixels per wheel notch.
;
; To check process names and control class names, add "?" to the ScrollSmooth
; process name and perform a scroll action.

ScrollSmooth = <sysListView32>:24|<Internet Explorer_Server>:20|WINWORD.EXE<_WwG>:10
;ScrollSmooth = ?|<sysListView32>:24|<Internet Explorer_Server>:20|WINWORD.EXE<_WwG>:10


; Configures the scroll speed for the scrolling feature.
;
; The scroll speed is proportional to the distance between the pointer and the
; position where the trigger key was pressed. For every 1 pixel of distance,
; the speed increases by ScrollVelocity (% of a notch per 10 ms).
; Additionally, for every 1 pixel of distance, the distance is amplified by
; ScrollAcceleration%, causing the scroll speed to accelerate.
; Setting a negative value for ScrollVelocity reverses the scroll direction.
; When the finger is lifted from the touchpad, the scroll speed decreases by
; ScrollResistance% every 10 ms.
;
; While scrolling, the foreground window is set to the transparency level
; specified by ScrollShowWindow (%).
;
; When using the scrolling feature, the number of lines scrolled per wheel
; notch is automatically set to ScrollWheelLines.
; If ScrollWheelLines is left unspecified, automatic configuration is disabled.
;
; Note: For processes/controls not specified in ScrollSmooth:
; When the trigger key is pressed and pointer movement is detected for the
; first time, a single notch scroll is performed.
; After that, speed is calculated in the same way as for processes specified in
; ScrollSmooth. Fractional notches accumulate, and when they reach one full
; notch, a scroll event is generated.

ScrollVelocity = 0.2
ScrollAcceleration = 0.4
ScrollResistance = 2.8
ScrollShowWindow = 85
ScrollWheelLines = 1


[LiftlessTap]
; Configure parameters for the Liftless Tap feature.
;
; If the finger touches the touchpad again within LiftTouchTime (10 ms) after
; leaving it, Liftless Tap mode becomes active.
; After touching it, if the finger remains touching and still for
; TouchPressTime (10 ms), a mouse button press event is generated.
; During the BlinkTime (10 ms) before the press event, the pointer blinks.
;
; In addition, if the finger remains touching and still for
; PressClickTime (10 ms), a mouse button release event is generated, completing
; a click action.
; If the pointer moves before PressClickTime (10 ms) elapses, the action
; becomes a drag operation, and the mouse button remains pressed even after
; PressClickTime (10 ms) has passed.
;
; After a drag has started, if the finger is lifted from the touchpad and the
; pointer remains stationary for DragLockTime (10 ms), a mouse button release
; event is generated, completing the drag operation.
;
; If the pointer moves no more than NearBy (pixels) in any direction
; (horizontal or vertical), the movement is considered negligible.
;
; While the mouse button is pressed, the tooltip displays the string
; BeginnersTip. During dragging, the tooltip text changes to DragTip.
; Each tooltip is shown with the transparency BeginnersTipTrans (%) and
; DragTipTrans (%), respectively.
;
; To disable this feature, set LiftTouchTime = 0.

LiftTouchTime = 0
; LiftTouchTime = 40
; Note: Disabled by default due to interference with two-finger scrolling.
TouchPressTime = 10
PressClickTime = 30
DragLockTime = 50
NearBy = 2
BeginnersTip = Press
DragTip = Press
BeginnersTipTrans = 60
DragTipTrans = 20
BlinkTime = 3

