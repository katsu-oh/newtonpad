Rem Shortcut Key Assignment
Rem Settings for key operations performed while touching the touchpad.
Rem
Rem File Format
Rem   CSV (comma-separated text) format. Values may be enclosed in double quotes.
Rem   To include a comma in a value, enclose the value in double quotes.
Rem   In that case, a literal double quote inside the value must be written as two consecutive double quotes.
Rem     Example: "first field",SecondField,"the word ""special"" is quoted literally",,"last field, has literal comma"
Rem
Rem Comments
Rem   Lines beginning with "Rem" are ignored and treated as comments.
Rem
Rem Format of Behavior Settings
Rem   The following four types of actions can be configured:
Rem     Exit NewtonPad .... [TriggerKey],ExitApp
Rem     Send Command ...... [TriggerKey],SendInput,[KeyDownAction],,[KeyUpAction](optional)
Rem     Run File .......... [TriggerKey],Run,[ExecutablePath],[RunOptions](optional) 
Rem     Scroll ............ [TriggerKey],Scroll
Rem
Rem   Parameters
Rem     [TriggerKey] ........ The KeyName parameter of AutoHotkey's Hotkey command (*1)
Rem     [KeyDownAction] ..... The Keys parameter of AutoHotkey's SendInput command (*2 *3 *4)
Rem     [KeyUpAction] ....... The Keys parameter of AutoHotkey's SendInput command (*2 *3 *4)
Rem     [ExecutablePath] .... The Target parameter of AutoHotkey's Run command
Rem     [RunOptions] ........ The Max|Min|Hide parameter of AutoHotkey's Run command
Rem
Rem   *1  You cannot directly specify an "Up" hotkey as [TriggerKey]. Use [KeyUpAction] instead.
Rem   *2  In [KeyDownAction] or [KeyUpAction], spaces and tabs are treated as part of the key sequence.
Rem       Do not include unnecessary spaces or tabs, including those before or after commas.
Rem   *3  Key repeat occurs only when [KeyUpAction] is omitted.
Rem   *4  This program cannot detect key-up events for CapsLock and Katakana/Hiragana.
Rem       These two keys are treated as if they are released immediately after being pressed.
Rem       (CapsLock = vkF0sc03A, Katakana/Hiragana = vkF2sc070)

Rem Exit NewtonPad
 Q,ExitApp

Rem Mouse button actions
 *J,SendInput,{Blind}{LButton Down},{Blind}{LButton Up}
 H,SendInput,{Shift Down}{LButton Down},{LButton Up}{Shift Up}
 U,SendInput,{Ctrl Down}{LButton Down},{LButton Up}{Ctrl Up}
 Y,SendInput,{Alt Down}{LButton Down},{LButton Up}{Alt Up}
 *K,SendInput,{Blind}{MButton Down},{Blind}{MButton Up}
 *L,SendInput,{Blind}{RButton Down},{Blind}{RButton Up}
 *M,SendInput,{Blind}{LButton}{LButton}

Rem Keyboard actions
 B,SendInput,{Alt Down}{Left}{Alt Up}
 N,SendInput,{Alt Down}{Right}{Alt Up}
 C,SendInput,{Ctrl Down}{F4}{Ctrl Up}
 X,SendInput,{Alt Down}{F4}{Alt Up}
 .,SendInput,{Ctrl Down}{Tab}{Ctrl Up}
 F,SendInput,{Ctrl Down}f{Ctrl Up}
 SPACE,SendInput,{Alt Down}{Esc}{Alt Up}

Rem Mouse-move actions
 UP,SendInput,{Click 0 -1 0 Rel}
 DOWN,SendInput,{Click 0 1 0 Rel}
 LEFT,SendInput,{Click -1 0 0 Rel}
 RIGHT,SendInput,{Click 1 0 0 Rel}

Rem Executable-run actions
 R,Run,NewtonPad.exe

Rem Configuration-switch actions
 F1,Run,
 F2,Run,NewtonPad.exe NewtonPad-Off.ini ThumbKey-Off.ini

Rem Scroll
 I,Scroll


